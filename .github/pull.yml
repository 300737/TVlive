version: "1"
rules:
  - base: main                     # 【你的仓库】要接收更新的分支（通常是main）
    upstream: wind005/TVlive:main  # 【要监控的别人仓库】用户名/仓库名:分支
    mergeMethod: squash            # 合并方式（推荐squash，历史干净）
    assignees: []                  # 可以为空[]，除非你想@特定人
    reviewers: []                  # 可以为空[]，除非你需要别人审核
